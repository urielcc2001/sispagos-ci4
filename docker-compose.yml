services:
  app:
    build: .
    container_name: refinancieros_app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    networks:
      - network_financieros

  db:
    image: mysql:8.0
    container_name: refinancieros_db
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    #  - ./sql-imports:/docker-entrypoint-initdb.d
    networks:
      - network_financieros

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: refinancieros_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    networks:
      - network_financieros

networks:
  network_financieros:
    driver: bridge

volumes:
  db_data: